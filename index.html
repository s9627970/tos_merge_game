<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神魔之塔合成煉成練習器 (Web精緻版)</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            touch-action: none;
        }
        canvas {
            background-color: #f5f5f5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
// ===========================
// 基本設定
// ===========================
const GRID_SIZE = 6;
const CELL_SIZE = 80;
const MARGIN = 5;
const BOARD_OFFSET_X = 20;
const BOARD_OFFSET_Y = 45;
const UI_WIDTH = 350;
const UI_PADDING = 20;
const MAX_LEVEL = 5;

const COLOR_MAP = {
    "水": "#50b4ff",
    "火": "#ff6464",
    "木": "#64dc78",
    "土": "#ffc850",
    "雷": "#b478ff"
};
const COLOR_NAMES = Object.keys(COLOR_MAP);

const board_right = BOARD_OFFSET_X + GRID_SIZE * (CELL_SIZE + MARGIN);
const UI_X = board_right + UI_PADDING;
const SCREEN_WIDTH = UI_X + UI_WIDTH + 20;
const SCREEN_HEIGHT = 600;

// 全域狀態
let spawnEnabled = true;
let customMode = false;
let selectedColor = "水";
let selectedLevel = 1;
let isAnimating = false;
let savedBoardState = null; // 儲存版面用

// 邊界常數
const EDGE_MARGIN = Math.max(64, Math.floor(0.08 * SCREEN_WIDTH));
const BOARD_PIXEL_WIDTH = GRID_SIZE * (CELL_SIZE + MARGIN) - MARGIN;
const BOARD_LEFT_X = BOARD_OFFSET_X;
const BOARD_RIGHT_X = BOARD_OFFSET_X + BOARD_PIXEL_WIDTH - 1;

const LEFT_THRESHOLD = BOARD_LEFT_X - EDGE_MARGIN;
const RIGHT_THRESHOLD = BOARD_RIGHT_X + EDGE_MARGIN;
const DOWN_THRESHOLD = BOARD_OFFSET_Y + GRID_SIZE * (CELL_SIZE + MARGIN) - MARGIN + EDGE_MARGIN;
const DRAG_REMOVE_DISTANCE = Math.max(48, Math.floor(0.6 * CELL_SIZE));

// 動畫暫存區
let removedTilesForAnimation = []; 
let swapAnimationTiles = []; // 負責渲染正在交換的珠子

// ===========================
// 動畫曲線與輔助函式 (Easing)
// ===========================
const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
const easeOutQuad = t => t * (2 - t);
const easeInQuad = t => t * t;
const easeOutBounce = t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1 / d1) return n1 * t * t;
    if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
    if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
    return n1 * (t -= 2.625 / d1) * t + 0.984375;
};
const easeOutBack = t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
};

// ===========================
// 類別與邏輯
// ===========================
class Tile {
    constructor(color, level) {
        this.color = color;
        this.level = level;
        this.x_offset = 0;
        this.y_offset = 0;
        this.scale = 1.0;
        this.alpha = 1.0;
    }

    clone() {
        return new Tile(this.color, this.level);
    }

    draw(ctx, x, y) {
        if (this.alpha <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = this.alpha;
        
        const cx = x + CELL_SIZE / 2 + this.x_offset;
        const cy = y + CELL_SIZE / 2 + this.y_offset;
        const radius = (CELL_SIZE / 2 - 5) * this.scale;
        
        if (radius > 0) {
            // 畫本體
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_MAP[this.color];
            ctx.fill();
            
            // 畫高光增加立體感
            ctx.beginPath();
            ctx.arc(cx - radius*0.3, cy - radius*0.3, radius*0.3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.fill();
            
            // 文字
            ctx.fillStyle = "#000000";
            ctx.font = `bold ${26 * this.scale}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.level, cx, cy);
        }
        ctx.restore();
    }
}

class Board {
    constructor() {
        this.grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                this.grid[i][j] = this.randomTile();
            }
        }
        this.selected = null;
        this.clearInitialMatches();
    }

    clearInitialMatches() {
        while (true) {
            let matches = this.findMatches();
            if (matches.length === 0) break;
            for (let m of matches) {
                let [dir, fixed, start, len] = m;
                if (dir === "row") {
                    for (let j = start; j < start + len; j++) this.grid[fixed][j] = this.randomTile();
                } else {
                    for (let i = start; i < start + len; i++) this.grid[i][fixed] = this.randomTile();
                }
            }
        }
    }

    randomTile() {
        let color = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
        return new Tile(color, 1);
    }

    draw(ctx) {
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                const x = BOARD_OFFSET_X + j * (CELL_SIZE + MARGIN);
                const y = BOARD_OFFSET_Y + i * (CELL_SIZE + MARGIN);
                
                // 底色格子
                ctx.fillStyle = "#E6E6E6";
                ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                
                const tile = this.grid[i][j];
                // 如果該珠子正在參與交換動畫，則不在此處繪製
                const isSwapping = swapAnimationTiles.some(t => t.i === i && t.j === j);
                
                if (tile && !isSwapping) {
                    tile.draw(ctx, x, y);
                }
                
                // 選中框線
                if (this.selected && this.selected.i === i && this.selected.j === j) {
                    ctx.strokeStyle = "rgba(0,0,0,0.6)";
                    ctx.lineWidth = 4;
                    ctx.lineJoin = "round";
                    ctx.strokeRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
                }
            }
        }
    }

    // 動畫交換處理
    async animatedSwap(pos1, pos2) {
        let t1 = this.grid[pos1.i][pos1.j];
        let t2 = this.grid[pos2.i][pos2.j];
        
        if (!t1 && !t2) return;

        // 計算實際像素距離
        let dx = (pos2.j - pos1.j) * (CELL_SIZE + MARGIN);
        let dy = (pos2.i - pos1.i) * (CELL_SIZE + MARGIN);

        // 將參與交換的珠子抽離至獨立渲染層
        if(t1) swapAnimationTiles.push({i: pos1.i, j: pos1.j, tile: t1, startX: 0, startY: 0, endX: dx, endY: dy});
        if(t2) swapAnimationTiles.push({i: pos2.i, j: pos2.j, tile: t2, startX: 0, startY: 0, endX: -dx, endY: -dy});

        const steps = 12;
        for (let s = 1; s <= steps; s++) {
            let progress = easeOutQuad(s / steps);
            swapAnimationTiles.forEach(item => {
                item.tile.x_offset = item.startX + (item.endX - item.startX) * progress;
                item.tile.y_offset = item.startY + (item.endY - item.startY) * progress;
            });
            await sleep(16); // 約 60fps
        }

        // 交換陣列資料並復原 offset
        let temp = this.grid[pos1.i][pos1.j];
        this.grid[pos1.i][pos1.j] = this.grid[pos2.i][pos2.j];
        this.grid[pos2.i][pos2.j] = temp;

        if(t1) { t1.x_offset = 0; t1.y_offset = 0; }
        if(t2) { t2.x_offset = 0; t2.y_offset = 0; }
        
        swapAnimationTiles = [];
    }

    findMatches() {
        let matches = [];
        // 橫向
        for (let i = 0; i < GRID_SIZE; i++) {
            let runColor = null, runLevel = null, runStart = 0, runLen = 0;
            for (let j = 0; j < GRID_SIZE; j++) {
                let t = this.grid[i][j];
                if (t && t.level < MAX_LEVEL && (runColor === null || (t.color === runColor && t.level === runLevel))) {
                    if (runColor === null) {
                        runColor = t.color; runLevel = t.level; runStart = j; runLen = 1;
                    } else { runLen++; }
                } else {
                    if (runLen >= 3) matches.push(["row", i, runStart, runLen, runColor, runLevel]);
                    if (t && t.level < MAX_LEVEL) {
                        runColor = t.color; runLevel = t.level; runStart = j; runLen = 1;
                    } else { runColor = null; runLevel = null; runLen = 0; }
                }
            }
            if (runLen >= 3) matches.push(["row", i, runStart, runLen, runColor, runLevel]);
        }

        // 直向
        for (let j = 0; j < GRID_SIZE; j++) {
            let runColor = null, runLevel = null, runStart = 0, runLen = 0;
            for (let i = 0; i < GRID_SIZE; i++) {
                let t = this.grid[i][j];
                if (t && t.level < MAX_LEVEL && (runColor === null || (t.color === runColor && t.level === runLevel))) {
                    if (runColor === null) {
                        runColor = t.color; runLevel = t.level; runStart = i; runLen = 1;
                    } else { runLen++; }
                } else {
                    if (runLen >= 3) matches.push(["col", j, runStart, runLen, runColor, runLevel]);
                    if (t && t.level < MAX_LEVEL) {
                        runColor = t.color; runLevel = t.level; runStart = i; runLen = 1;
                    } else { runColor = null; runLevel = null; runLen = 0; }
                }
            }
            if (runLen >= 3) matches.push(["col", j, runStart, runLen, runColor, runLevel]);
        }
        return matches;
    }

    async applyMatches(matches) {
        if (!matches || matches.length === 0) return false;
        
        let cleared = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));

        for (let m of matches) {
            let [direction, fixed, start, length, color, level] = m;
            if (length < 3) continue;

            let isMaxLevel = (level >= MAX_LEVEL);
            let midStart = start + 1;
            let midEnd = start + length - 2;

            if (direction === "row") {
                cleared[fixed][start] = true;
                cleared[fixed][start + length - 1] = true;
                for (let jj = midStart; jj <= midEnd; jj++) {
                    let current = this.grid[fixed][jj];
                    let baseLvl = current ? current.level : level;
                    let newLvl = isMaxLevel ? baseLvl : Math.min(MAX_LEVEL, baseLvl + 1);
                    this.grid[fixed][jj] = new Tile(color, newLvl);
                    // 升級動畫：從 0 彈出
                    this.grid[fixed][jj].scale = 0;
                }
            } else {
                cleared[start][fixed] = true;
                cleared[start + length - 1][fixed] = true;
                for (let ii = midStart; ii <= midEnd; ii++) {
                    let current = this.grid[ii][fixed];
                    let baseLvl = current ? current.level : level;
                    let newLvl = isMaxLevel ? baseLvl : Math.min(MAX_LEVEL, baseLvl + 1);
                    this.grid[ii][fixed] = new Tile(color, newLvl);
                    this.grid[ii][fixed].scale = 0;
                }
            }
        }

        // 收集消除珠子
        removedTilesForAnimation = [];
        let upgradeTiles = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                if (cleared[i][j] && this.grid[i][j]) {
                    removedTilesForAnimation.push({ i, j, tile: this.grid[i][j] });
                    this.grid[i][j] = null;
                }
                if (this.grid[i][j] && this.grid[i][j].scale === 0) {
                    upgradeTiles.push(this.grid[i][j]);
                }
            }
        }

        // 消除動畫 (Pop & Fade out)
        const animSteps = 15;
        for (let step = 1; step <= animSteps; step++) {
            let t = step / animSteps;
            removedTilesForAnimation.forEach(rt => {
                if (t < 0.3) {
                    rt.tile.scale = 1 + easeOutQuad(t / 0.3) * 0.2; // 稍微放大
                } else {
                    let shrinkT = (t - 0.3) / 0.7;
                    rt.tile.scale = 1.2 - easeInQuad(shrinkT) * 1.2; // 縮小到0
                    rt.tile.alpha = 1 - shrinkT; // 淡出
                }
            });
            upgradeTiles.forEach(ut => {
                ut.scale = Math.min(1, easeOutBack(t)); // 升級珠子彈出
            });
            await sleep(16);
        }
        removedTilesForAnimation = [];
        upgradeTiles.forEach(ut => ut.scale = 1);

        // 處理掉落 (計算物理距離)
        let fallingTiles = [];
        for (let j = 0; j < GRID_SIZE; j++) {
            let stack = [];
            for (let i = GRID_SIZE - 1; i >= 0; i--) {
                if (this.grid[i][j]) stack.push(this.grid[i][j]);
            }
            
            for (let i = GRID_SIZE - 1; i >= 0; i--) {
                if (stack.length > 0) {
                    let tile = stack.shift();
                    // 計算目前物理上在陣列中的哪個位置(y_offset)
                    let currentRealY = this.grid.findIndex(row => row[j] === tile); 
                    if(currentRealY !== -1 && currentRealY !== i) {
                        tile.y_offset -= (i - currentRealY) * (CELL_SIZE + MARGIN);
                        fallingTiles.push(tile);
                    }
                    this.grid[i][j] = tile;
                } else {
                    if (spawnEnabled) {
                        let nt = this.randomTile();
                        nt.y_offset = -(i + 1) * (CELL_SIZE + MARGIN); // 從畫面頂部外生成
                        this.grid[i][j] = nt;
                        fallingTiles.push(nt);
                    } else {
                        this.grid[i][j] = null;
                    }
                }
            }
        }

        // 掉落動畫 (Bounce)
        if (fallingTiles.length > 0) {
            const dropSteps = 24;
            // 記錄起始位置
            fallingTiles.forEach(t => t.startY = t.y_offset);
            
            for (let s = 1; s <= dropSteps; s++) {
                let progress = easeOutBounce(s / dropSteps);
                fallingTiles.forEach(t => {
                    t.y_offset = t.startY * (1 - progress);
                });
                await sleep(16);
            }
            fallingTiles.forEach(t => t.y_offset = 0);
        }

        // 連鎖
        let newMatches = this.findMatches();
        if (newMatches.length > 0) {
            await sleep(150);
            await this.applyMatches(newMatches);
        }
    }

    async removeAndCollapse(ri, rj) {
        if (ri < 0 || ri >= GRID_SIZE || rj < 0 || rj >= GRID_SIZE) return;
        if (!this.grid[ri][rj]) return;

        let removedTile = this.grid[ri][rj];
        this.grid[ri][rj] = null;

        // 單顆消失動畫
        removedTilesForAnimation = [{ i: ri, j: rj, tile: removedTile }];
        const steps = 15;
        for (let step = 1; step <= steps; step++) {
            let t = step / steps;
            removedTilesForAnimation[0].tile.scale = 1 - easeInQuad(t);
            removedTilesForAnimation[0].tile.alpha = 1 - t;
            await sleep(16);
        }
        removedTilesForAnimation = [];

        // 單行掉落
        let j = rj;
        let stack = [];
        let fallingTiles = [];
        
        for (let i = GRID_SIZE - 1; i >= 0; i--) {
            if (this.grid[i][j]) stack.push(this.grid[i][j]);
        }
        
        for (let i = GRID_SIZE - 1; i >= 0; i--) {
            if (stack.length > 0) {
                let tile = stack.shift();
                let currentRealY = this.grid.findIndex(row => row[j] === tile); 
                if(currentRealY !== -1 && currentRealY !== i) {
                    tile.y_offset -= (i - currentRealY) * (CELL_SIZE + MARGIN);
                    fallingTiles.push(tile);
                }
                this.grid[i][j] = tile;
            } else {
                if (spawnEnabled) {
                    let nt = this.randomTile();
                    nt.y_offset = -(i + 1) * (CELL_SIZE + MARGIN);
                    this.grid[i][j] = nt;
                    fallingTiles.push(nt);
                } else {
                    this.grid[i][j] = null;
                }
            }
        }

        if (fallingTiles.length > 0) {
            const dropSteps = 24;
            fallingTiles.forEach(t => t.startY = t.y_offset);
            for (let s = 1; s <= dropSteps; s++) {
                let progress = easeOutBounce(s / dropSteps);
                fallingTiles.forEach(t => t.y_offset = t.startY * (1 - progress));
                await sleep(16);
            }
            fallingTiles.forEach(t => t.y_offset = 0);
        }

        let newMatches = this.findMatches();
        if (newMatches.length > 0) {
            await sleep(100);
            await this.applyMatches(newMatches);
        }
    }
}

// ===========================
// 畫布與全域繪圖
// ===========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = SCREEN_WIDTH;
canvas.height = SCREEN_HEIGHT;

let board = new Board();

// UI 區域參數
const customBtn = { x: UI_X + 10, y: 60, w: 140, h: 40 };
const colorArea = { x: UI_X + 10, y: 140, w: COLOR_NAMES.length * 60, h: 50 };
const levelArea = { x: UI_X + 10, y: 240, w: MAX_LEVEL * 60, h: 50 };
const spawnBtn = { x: UI_X + 10, y: 320, w: 120, h: 40 };
const saveBtn = { x: UI_X + 10, y: 380, w: 100, h: 40 };
const loadBtn = { x: UI_X + 120, y: 380, w: 100, h: 40 };

function drawRect(x, y, w, h, color, outline=false, radius=5) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, radius);
    ctx.fill();
    
    if (outline) {
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 3;
        ctx.stroke();
    }
}

function drawText(text, x, y, size=18, color="#000", align="left") {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px 'Noto Sans TC', sans-serif`;
    ctx.textAlign = align;
    ctx.textBaseline = "middle";
    ctx.fillText(text, x, y);
}

function renderLoop() {
    // 背景
    ctx.fillStyle = "#F5F5F5";
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    
    board.draw(ctx);

    // 繪製交換中的珠子 (在上層)
    for (let st of swapAnimationTiles) {
        const x = BOARD_OFFSET_X + st.j * (CELL_SIZE + MARGIN);
        const y = BOARD_OFFSET_Y + st.i * (CELL_SIZE + MARGIN);
        st.tile.draw(ctx, x, y);
    }

    // 繪製動畫中的消失珠子
    for (let rt of removedTilesForAnimation) {
        const x = BOARD_OFFSET_X + rt.j * (CELL_SIZE + MARGIN);
        const y = BOARD_OFFSET_Y + rt.i * (CELL_SIZE + MARGIN);
        rt.tile.draw(ctx, x, y);
    }

    // 右側 UI
    ctx.fillStyle = "#DCDCDC";
    ctx.fillRect(UI_X, 0, UI_WIDTH, SCREEN_HEIGHT);

    // 自訂按鈕
    drawRect(customBtn.x, customBtn.y, customBtn.w, customBtn.h, customMode ? "#A0C8A0" : "#C8C8C8");
    drawText(`自訂模式: ${customMode ? "ON" : "OFF"}`, customBtn.x + customBtn.w/2, customBtn.y + customBtn.h/2, 16, "#000", "center");

    // 標題說明
    drawText("點擊按鈕切換自訂版面", UI_X + UI_WIDTH/2, 30, 18, "#333", "center");

    // 顏色選擇
    drawText("選擇顏色:", UI_X + 10, 120);
    COLOR_NAMES.forEach((color, idx) => {
        let x = UI_X + 10 + idx * 60;
        let y = 140;
        drawRect(x, y, 50, 50, COLOR_MAP[color], selectedColor === color, 25); // 畫成圓形按鈕
    });

    // 等級選擇
    drawText("選擇等級:", UI_X + 10, 220);
    for (let lvl = 1; lvl <= MAX_LEVEL; lvl++) {
        let x = UI_X + 10 + (lvl - 1) * 60;
        let y = 240;
        drawRect(x, y, 50, 50, "#C8C8C8", selectedLevel === lvl);
        drawText(lvl.toString(), x + 25, y + 25, 24, "#000", "center");
    }

    // 天降開關
    drawRect(spawnBtn.x, spawnBtn.y, spawnBtn.w, spawnBtn.h, spawnEnabled ? "#A0C8A0" : "#C8A0A0");
    drawText(`天降: ${spawnEnabled ? "ON" : "OFF"}`, spawnBtn.x + spawnBtn.w/2, spawnBtn.y + spawnBtn.h/2, 16, "#000", "center");

    // 儲存與還原按鈕
    drawRect(saveBtn.x, saveBtn.y, saveBtn.w, saveBtn.h, "#90B0D0");
    drawText("儲存版面", saveBtn.x + saveBtn.w/2, saveBtn.y + saveBtn.h/2, 16, "#000", "center");
    
    drawRect(loadBtn.x, loadBtn.y, loadBtn.w, loadBtn.h, savedBoardState ? "#90B0D0" : "#A0A0A0");
    drawText("還原版面", loadBtn.x + loadBtn.w/2, loadBtn.y + loadBtn.h/2, 16, savedBoardState ? "#000" : "#666", "center");

    requestAnimationFrame(renderLoop);
}

// 啟動繪圖迴圈
requestAnimationFrame(renderLoop);

// ===========================
// 互動處理
// ===========================
function getCellFromMouse(mx, my) {
    for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
            let x = BOARD_OFFSET_X + j * (CELL_SIZE + MARGIN);
            let y = BOARD_OFFSET_Y + i * (CELL_SIZE + MARGIN);
            if (mx >= x && mx < x + CELL_SIZE && my >= y && my < y + CELL_SIZE) return { i, j };
        }
    }
    return null;
}

function saveBoard() {
    savedBoardState = board.grid.map(row => 
        row.map(tile => tile ? tile.clone() : null)
    );
}

function loadBoard() {
    if (!savedBoardState) return;
    board.grid = savedBoardState.map(row => 
        row.map(tile => tile ? tile.clone() : null)
    );
}

let dragStart = null;
let dragStartPixel = null;

canvas.addEventListener('mousedown', (e) => {
    if (isAnimating) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // 檢查 UI 點擊
    if (mx >= customBtn.x && mx <= customBtn.x + customBtn.w && my >= customBtn.y && my <= customBtn.y + customBtn.h) {
        customMode = !customMode; return;
    }
    if (mx >= spawnBtn.x && mx <= spawnBtn.x + spawnBtn.w && my >= spawnBtn.y && my <= spawnBtn.y + spawnBtn.h) {
        spawnEnabled = !spawnEnabled; return;
    }
    if (mx >= saveBtn.x && mx <= saveBtn.x + saveBtn.w && my >= saveBtn.y && my <= saveBtn.y + saveBtn.h) {
        saveBoard(); return;
    }
    if (savedBoardState && mx >= loadBtn.x && mx <= loadBtn.x + loadBtn.w && my >= loadBtn.y && my <= loadBtn.y + loadBtn.h) {
        loadBoard(); return;
    }

    if (mx >= colorArea.x && mx <= colorArea.x + colorArea.w && my >= colorArea.y && my <= colorArea.y + colorArea.h) {
        let idx = Math.floor((mx - colorArea.x) / 60);
        if (idx >= 0 && idx < COLOR_NAMES.length) selectedColor = COLOR_NAMES[idx];
        return;
    }
    if (mx >= levelArea.x && mx <= levelArea.x + levelArea.w && my >= levelArea.y && my <= levelArea.y + levelArea.h) {
        let idx = Math.floor((mx - levelArea.x) / 60);
        if (idx >= 0 && idx < MAX_LEVEL) selectedLevel = idx + 1;
        return;
    }

    // 檢查盤面點擊
    let pos = getCellFromMouse(mx, my);
    if (pos) {
        dragStart = pos;
        board.selected = pos;
        dragStartPixel = { x: mx, y: my };
        
        if (customMode) {
            board.grid[pos.i][pos.j] = new Tile(selectedColor, selectedLevel);
        }
    }
});

canvas.addEventListener('mouseup', async (e) => {
    if (isAnimating || !dragStart) {
        dragStart = null;
        if(board) board.selected = null;
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const endCell = getCellFromMouse(mx, my);

    isAnimating = true; 
    let { i: si, j: sj } = dragStart;

    if (endCell && !customMode) {
        // 放開在有效格子，判斷是否相鄰
        if (Math.abs(si - endCell.i) + Math.abs(sj - endCell.j) === 1) {
            await board.animatedSwap(dragStart, endCell); // 播放滑順交換動畫
            
            while (true) {
                let matches = board.findMatches();
                if (matches.length > 0) {
                    await board.applyMatches(matches);
                } else {
                    break;
                }
            }
        }
    } else if (!endCell && !customMode) {
        // 拖出邊界刪除邏輯
        let dx = mx - dragStartPixel.x;
        let dy = my - dragStartPixel.y;

        if (sj === 0 && (mx < LEFT_THRESHOLD || dx < -DRAG_REMOVE_DISTANCE)) {
            await board.removeAndCollapse(si, sj);
        } else if (sj === GRID_SIZE - 1 && (mx > RIGHT_THRESHOLD || dx > DRAG_REMOVE_DISTANCE)) {
            await board.removeAndCollapse(si, sj);
        } else if (si === GRID_SIZE - 1 && (my > DOWN_THRESHOLD || dy > DRAG_REMOVE_DISTANCE)) {
            await board.removeAndCollapse(si, sj);
        }
    }

    board.selected = null;
    dragStart = null;
    dragStartPixel = null;
    isAnimating = false; 
});

// 手機觸控支援
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    let touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }));
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    let touch = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: touch.clientX, clientY: touch.clientY }));
}, {passive: false});

</script>
