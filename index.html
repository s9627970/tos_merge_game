<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神魔之塔合成煉成練習器 by YK</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px 0;
            user-select: none;
            text-align: center;
        }
        canvas {
            background-color: #f5f5f5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 8px;
            max-width: 100vw;
            height: auto;
            margin: 0 auto;
            display: block;
            touch-action: pan-y;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
// ===========================
// 基本設定 (改用 let 以支援動態排版)
// ===========================
const GRID_SIZE = 6;
let CELL_SIZE = 80;
const MARGIN = 5;
let BOARD_OFFSET_X = 20;
let BOARD_OFFSET_Y = 45;
let UI_WIDTH = 350;
let UI_PADDING = 20;
const MAX_LEVEL = 5;

const COLOR_MAP = {
    "水": "#56B4E9", // 天藍色 (Sky Blue)：維持水的視覺直覺，明度較高。
    "火": "#D55E00", // 朱紅色 (Vermilion)：偏橘的深紅色，在色盲眼中明度較暗，能有效與綠色錯開。
    "木": "#009E73", // 藍綠色 (Bluish Green)：加入一點藍色調的深綠色，與朱紅色的對比非常強烈。
    "土": "#F0E442", // 明黃色 (Yellow)：擁有極高的明度，任何類型的色覺障礙都能一眼認出。
    "雷": "#CC79A7"  // 紫紅色 (Reddish Purple)：取代原本的純紫色，調整了紅藍比例，避免與天藍色混淆。
};
const COLOR_NAMES = Object.keys(COLOR_MAP);

// ===========================
// 圖片載入系統
// ===========================
const IMAGE_PREFIX = {
    "水": "w",
    "火": "f",
    "木": "g",
    "土": "l",
    "雷": "d"
};

const tileImages = {};
let imagesLoadedCount = 0;
const totalImages = 25; // 5種屬性 * 5個等級

// 預先載入所有圖片，存入 tileImages 物件中
for (const [color, prefix] of Object.entries(IMAGE_PREFIX)) {
    for (let lvl = 1; lvl <= MAX_LEVEL; lvl++) {
        const img = new Image();
        img.src = `${prefix}_${lvl}.png`; // 讀取你設定的圖片路徑
        img.onload = () => { imagesLoadedCount++; };
        tileImages[`${prefix}_${lvl}`] = img;
    }
}

let board_right, UI_X, UI_Y, SCREEN_WIDTH, SCREEN_HEIGHT;

// 全域狀態
let spawnEnabled = true;
let customMode = false;
let selectedColor = "水";
let selectedLevel = 1;
let isAnimating = false;
let savedBoardState = null; 
let movesCount = 0;

// 邊界常數
let EDGE_MARGIN, BOARD_PIXEL_WIDTH, BOARD_LEFT_X, BOARD_RIGHT_X;
let LEFT_THRESHOLD, RIGHT_THRESHOLD, DOWN_THRESHOLD, DRAG_REMOVE_DISTANCE;

// UI 區域參數
let customBtn, resetMovesBtn, colorArea, levelArea, spawnBtn, saveBtn, loadBtn;
let titlePos, colorTextPos, levelTextPos;
let isMobileLayout = false;

// 取得 Canvas (移到最前面以便 initLayout 使用)
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 動態佈局初始化
function initLayout() {
    let winW = window.innerWidth;
    isMobileLayout = winW < 500;

    if (isMobileLayout) {
        // 手機版：垂直排版
        BOARD_OFFSET_X = 10;
        BOARD_OFFSET_Y = 60;
        let availableWidth = Math.min(winW, 500) - (BOARD_OFFSET_X * 2);
        CELL_SIZE = Math.floor(availableWidth / GRID_SIZE) - MARGIN;
        
        let board_bottom = BOARD_OFFSET_Y + GRID_SIZE * (CELL_SIZE + MARGIN);
        
        UI_X = 0;
        UI_Y = board_bottom + 20;
        UI_WIDTH = Math.min(winW, 500);
        
        SCREEN_WIDTH = UI_WIDTH;
        SCREEN_HEIGHT = UI_Y + 500; // 預留空間給 UI

        titlePos = { x: SCREEN_WIDTH / 2, y: 30 };
        
        customBtn = { x: 20, y: UI_Y + 10, w: 140, h: 40 };

        resetMovesBtn = { x: 170, y: UI_Y + 10, w: 130, h: 40 };

        colorTextPos = { x: 20, y: UI_Y + 80 };
        
        let spacing = Math.min(60, (SCREEN_WIDTH - 40) / COLOR_NAMES.length);
        let size = Math.min(50, spacing - 5);
        colorArea = { x: 20, y: UI_Y + 100, w: COLOR_NAMES.length * spacing, h: size, spacing: spacing, size: size };
        
        levelTextPos = { x: 20, y: UI_Y + 170 + (size - 50) };
        let l_spacing = Math.min(60, (SCREEN_WIDTH - 40) / MAX_LEVEL);
        let l_size = Math.min(50, l_spacing - 5);
        levelArea = { x: 20, y: UI_Y + 190 + (size - 50), w: MAX_LEVEL * l_spacing, h: l_size, spacing: l_spacing, size: l_size };
        
        spawnBtn = { x: 20, y: UI_Y + 260 + (size - 50)*2, w: 120, h: 40 };
        saveBtn = { x: 20, y: UI_Y + 315 + (size - 50)*2, w: 100, h: 40 };
        loadBtn = { x: 140, y: UI_Y + 315 + (size - 50)*2, w: 100, h: 40 };

    } else {
        // 電腦版：水平排版
        CELL_SIZE = 80;
        BOARD_OFFSET_X = 20;
        BOARD_OFFSET_Y = 45;
        UI_WIDTH = 350;

        board_right = BOARD_OFFSET_X + GRID_SIZE * (CELL_SIZE + MARGIN);
        UI_X = board_right + UI_PADDING;
        UI_Y = 0;
        SCREEN_WIDTH = UI_X + UI_WIDTH + 20;
        SCREEN_HEIGHT = 600;

        titlePos = { x: UI_X + UI_WIDTH/2, y: 30 };
        customBtn = { x: UI_X + 10, y: 60, w: 140, h: 40 };

        resetMovesBtn = { x: UI_X + 160, y: 60, w: 130, h: 40 };
        
        colorTextPos = { x: UI_X + 10, y: 120 };
        colorArea = { x: UI_X + 10, y: 140, w: COLOR_NAMES.length * 60, h: 50, spacing: 60, size: 50 };
        
        levelTextPos = { x: UI_X + 10, y: 220 };
        levelArea = { x: UI_X + 10, y: 240, w: MAX_LEVEL * 60, h: 50, spacing: 60, size: 50 };
        
        spawnBtn = { x: UI_X + 10, y: 320, w: 120, h: 40 };
        saveBtn = { x: UI_X + 10, y: 380, w: 100, h: 40 };
        loadBtn = { x: UI_X + 120, y: 380, w: 100, h: 40 };
    }

    // 重新計算邊界常數
    EDGE_MARGIN = Math.max(64, Math.floor(0.08 * SCREEN_WIDTH));
    BOARD_PIXEL_WIDTH = GRID_SIZE * (CELL_SIZE + MARGIN) - MARGIN;
    BOARD_LEFT_X = BOARD_OFFSET_X;
    BOARD_RIGHT_X = BOARD_OFFSET_X + BOARD_PIXEL_WIDTH - 1;

    LEFT_THRESHOLD = BOARD_LEFT_X - EDGE_MARGIN;
    RIGHT_THRESHOLD = BOARD_RIGHT_X + EDGE_MARGIN;
    DOWN_THRESHOLD = BOARD_OFFSET_Y + GRID_SIZE * (CELL_SIZE + MARGIN) - MARGIN + EDGE_MARGIN;
    DRAG_REMOVE_DISTANCE = Math.max(48, Math.floor(0.6 * CELL_SIZE));
    
    if(canvas) {
        canvas.width = SCREEN_WIDTH;
        canvas.height = SCREEN_HEIGHT;
    }
}

// 動畫暫存區
let removedTilesForAnimation = []; 
let swapAnimationTiles = []; 

// ===========================
// 動畫曲線與輔助函式 (Easing)
// ===========================
const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
const easeOutQuad = t => t * (2 - t);
const easeInQuad = t => t * t;
const easeOutBounce = t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1 / d1) return n1 * t * t;
    if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
    if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
    return n1 * (t -= 2.625 / d1) * t + 0.984375;
};
const easeOutBack = t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
};

// ===========================
// 類別與邏輯
// ===========================
class Tile {
    constructor(color, level) {
        this.color = color;
        this.level = level;
        this.x_offset = 0;
        this.y_offset = 0;
        this.scale = 1.0;
        this.alpha = 1.0;
    }

    clone() {
        return new Tile(this.color, this.level);
    }

    draw(ctx, x, y) {
        if (this.alpha <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = this.alpha;
        
        const cx = x + CELL_SIZE / 2 + this.x_offset;
        const cy = y + CELL_SIZE / 2 + this.y_offset;
        
        // 設定圖片的繪製尺寸 (扣掉一點邊距)
        const size = (CELL_SIZE - 5) * this.scale;
        
        const prefix = IMAGE_PREFIX[this.color];
        const img = tileImages[`${prefix}_${this.level}`];

        if (size > 0) {
            // 確認圖片已經成功載入且可用
            if (img && img.complete && img.naturalWidth > 0) {
                // 將圖片置中繪製
                ctx.drawImage(img, cx - size / 2, cy - size / 2, size, size);
            } else {
                // Fallback：如果圖片還沒載入好，先畫原本的圓形跟數字頂著
                const radius = size / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fillStyle = COLOR_MAP[this.color];
                ctx.fill();
                
                ctx.fillStyle = "#000000";
                ctx.font = `bold ${Math.floor(CELL_SIZE * 0.325) * this.scale}px sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.level, cx, cy);
            }
        }
        ctx.restore();
    }
}

class Board {
    constructor() {
        this.grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                this.grid[i][j] = this.randomTile();
            }
        }
        this.selected = null;
        this.clearInitialMatches();
    }

    clearInitialMatches() {
        while (true) {
            let matches = this.findMatches();
            if (matches.length === 0) break;
            for (let m of matches) {
                let [dir, fixed, start, len] = m;
                if (dir === "row") {
                    for (let j = start; j < start + len; j++) this.grid[fixed][j] = this.randomTile();
                } else {
                    for (let i = start; i < start + len; i++) this.grid[i][fixed] = this.randomTile();
                }
            }
        }
    }

    randomTile() {
        let color = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
        return new Tile(color, 1);
    }

    draw(ctx) {
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                const x = BOARD_OFFSET_X + j * (CELL_SIZE + MARGIN);
                const y = BOARD_OFFSET_Y + i * (CELL_SIZE + MARGIN);
                
                ctx.fillStyle = "#38322D";
                ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                
                const tile = this.grid[i][j];
                const isSwapping = swapAnimationTiles.some(t => t.i === i && t.j === j);
                
                if (tile && !isSwapping) {
                    tile.draw(ctx, x, y);
                }
                
                if (this.selected && this.selected.i === i && this.selected.j === j) {
                    ctx.strokeStyle = "rgba(0,0,0,0.6)";
                    ctx.lineWidth = 4;
                    ctx.lineJoin = "round";
                    ctx.strokeRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
                }
            }
        }
    }

    async animatedSwap(pos1, pos2) {
        let t1 = this.grid[pos1.i][pos1.j];
        let t2 = this.grid[pos2.i][pos2.j];
        
        if (!t1 && !t2) return;

        let dx = (pos2.j - pos1.j) * (CELL_SIZE + MARGIN);
        let dy = (pos2.i - pos1.i) * (CELL_SIZE + MARGIN);

        if(t1) swapAnimationTiles.push({i: pos1.i, j: pos1.j, tile: t1, startX: 0, startY: 0, endX: dx, endY: dy});
        if(t2) swapAnimationTiles.push({i: pos2.i, j: pos2.j, tile: t2, startX: 0, startY: 0, endX: -dx, endY: -dy});

        const steps = 12;
        for (let s = 1; s <= steps; s++) {
            let progress = easeOutQuad(s / steps);
            swapAnimationTiles.forEach(item => {
                item.tile.x_offset = item.startX + (item.endX - item.startX) * progress;
                item.tile.y_offset = item.startY + (item.endY - item.startY) * progress;
            });
            await sleep(16); 
        }

        let temp = this.grid[pos1.i][pos1.j];
        this.grid[pos1.i][pos1.j] = this.grid[pos2.i][pos2.j];
        this.grid[pos2.i][pos2.j] = temp;

        if(t1) { t1.x_offset = 0; t1.y_offset = 0; }
        if(t2) { t2.x_offset = 0; t2.y_offset = 0; }
        
        swapAnimationTiles = [];
    }

    findMatches() {
        let matches = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            let runColor = null, runLevel = null, runStart = 0, runLen = 0;
            for (let j = 0; j < GRID_SIZE; j++) {
                let t = this.grid[i][j];
                if (t && t.level < MAX_LEVEL && (runColor === null || (t.color === runColor && t.level === runLevel))) {
                    if (runColor === null) {
                        runColor = t.color; runLevel = t.level; runStart = j; runLen = 1;
                    } else { runLen++; }
                } else {
                    if (runLen >= 3) matches.push(["row", i, runStart, runLen, runColor, runLevel]);
                    if (t && t.level < MAX_LEVEL) {
                        runColor = t.color; runLevel = t.level; runStart = j; runLen = 1;
                    } else { runColor = null; runLevel = null; runLen = 0; }
                }
            }
            if (runLen >= 3) matches.push(["row", i, runStart, runLen, runColor, runLevel]);
        }

        for (let j = 0; j < GRID_SIZE; j++) {
            let runColor = null, runLevel = null, runStart = 0, runLen = 0;
            for (let i = 0; i < GRID_SIZE; i++) {
                let t = this.grid[i][j];
                if (t && t.level < MAX_LEVEL && (runColor === null || (t.color === runColor && t.level === runLevel))) {
                    if (runColor === null) {
                        runColor = t.color; runLevel = t.level; runStart = i; runLen = 1;
                    } else { runLen++; }
                } else {
                    if (runLen >= 3) matches.push(["col", j, runStart, runLen, runColor, runLevel]);
                    if (t && t.level < MAX_LEVEL) {
                        runColor = t.color; runLevel = t.level; runStart = i; runLen = 1;
                    } else { runColor = null; runLevel = null; runLen = 0; }
                }
            }
            if (runLen >= 3) matches.push(["col", j, runStart, runLen, runColor, runLevel]);
        }
        return matches;
    }

    async applyMatches(matches) {
        if (!matches || matches.length === 0) return false;
        
        let cleared = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));
        let upgraded = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false)); // 新增：記錄已被標記為升級的位置

        for (let m of matches) {
            let [direction, fixed, start, length, color, level] = m;
            if (length < 3) continue;

            let isMaxLevel = (level >= MAX_LEVEL);
            let midStart = start + 1;
            let midEnd = start + length - 2;
            
            // 修正：統一使用該組連線的原始 level 來計算新等級，防止交集點意外連升兩級
            let newLvl = isMaxLevel ? level : Math.min(MAX_LEVEL, level + 1); 

            if (direction === "row") {
                cleared[fixed][start] = true;
                cleared[fixed][start + length - 1] = true;
                for (let jj = midStart; jj <= midEnd; jj++) {
                    this.grid[fixed][jj] = new Tile(color, newLvl);
                    this.grid[fixed][jj].scale = 0;
                    upgraded[fixed][jj] = true; // 標記為升級
                }
            } else {
                cleared[start][fixed] = true;
                cleared[start + length - 1][fixed] = true;
                for (let ii = midStart; ii <= midEnd; ii++) {
                    this.grid[ii][fixed] = new Tile(color, newLvl);
                    this.grid[ii][fixed].scale = 0;
                    upgraded[ii][fixed] = true; // 標記為升級
                }
            }
        }

        removedTilesForAnimation = [];
        let upgradeTiles = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                // 修正重點：如果該位置被標記為消除，但「沒有」被標記為升級，才將其移除
                if (cleared[i][j] && !upgraded[i][j] && this.grid[i][j]) {
                    removedTilesForAnimation.push({ i, j, tile: this.grid[i][j] });
                    this.grid[i][j] = null;
                }
                if (this.grid[i][j] && this.grid[i][j].scale === 0) {
                    upgradeTiles.push(this.grid[i][j]);
                }
            }
        }

        const animSteps = 15;
        for (let step = 1; step <= animSteps; step++) {
            let t = step / animSteps;
            removedTilesForAnimation.forEach(rt => {
                if (t < 0.3) {
                    rt.tile.scale = 1 + easeOutQuad(t / 0.3) * 0.2; 
                } else {
                    let shrinkT = (t - 0.3) / 0.7;
                    rt.tile.scale = 1.2 - easeInQuad(shrinkT) * 1.2; 
                    rt.tile.alpha = 1 - shrinkT; 
                }
            });
            upgradeTiles.forEach(ut => {
                ut.scale = Math.min(1, easeOutBack(t)); 
            });
            await sleep(16);
        }
        removedTilesForAnimation = [];
        upgradeTiles.forEach(ut => ut.scale = 1);

        let fallingTiles = [];
        for (let j = 0; j < GRID_SIZE; j++) {
            let stack = [];
            for (let i = GRID_SIZE - 1; i >= 0; i--) {
                if (this.grid[i][j]) stack.push(this.grid[i][j]);
            }
            
            for (let i = GRID_SIZE - 1; i >= 0; i--) {
                if (stack.length > 0) {
                    let tile = stack.shift();
                    let currentRealY = this.grid.findIndex(row => row[j] === tile); 
                    if(currentRealY !== -1 && currentRealY !== i) {
                        tile.y_offset -= (i - currentRealY) * (CELL_SIZE + MARGIN);
                        fallingTiles.push(tile);
                    }
                    this.grid[i][j] = tile;
                } else {
                    if (spawnEnabled) {
                        let nt = this.randomTile();
                        nt.y_offset = -(i + 1) * (CELL_SIZE + MARGIN); 
                        this.grid[i][j] = nt;
                        fallingTiles.push(nt);
                    } else {
                        this.grid[i][j] = null;
                    }
                }
            }
        }

        if (fallingTiles.length > 0) {
            const dropSteps = 24;
            fallingTiles.forEach(t => t.startY = t.y_offset);
            
            for (let s = 1; s <= dropSteps; s++) {
                let progress = easeOutBounce(s / dropSteps);
                fallingTiles.forEach(t => {
                    t.y_offset = t.startY * (1 - progress);
                });
                await sleep(16);
            }
            fallingTiles.forEach(t => t.y_offset = 0);
        }

        let newMatches = this.findMatches();
        if (newMatches.length > 0) {
            await sleep(150);
            await this.applyMatches(newMatches);
        }
    }

    async removeAndCollapse(ri, rj) {
        if (ri < 0 || ri >= GRID_SIZE || rj < 0 || rj >= GRID_SIZE) return;
        if (!this.grid[ri][rj]) return;

        let removedTile = this.grid[ri][rj];
        this.grid[ri][rj] = null;

        removedTilesForAnimation = [{ i: ri, j: rj, tile: removedTile }];
        const steps = 15;
        for (let step = 1; step <= steps; step++) {
            let t = step / steps;
            removedTilesForAnimation[0].tile.scale = 1 - easeInQuad(t);
            removedTilesForAnimation[0].tile.alpha = 1 - t;
            await sleep(16);
        }
        removedTilesForAnimation = [];

        let j = rj;
        let stack = [];
        let fallingTiles = [];
        
        for (let i = GRID_SIZE - 1; i >= 0; i--) {
            if (this.grid[i][j]) stack.push(this.grid[i][j]);
        }
        
        for (let i = GRID_SIZE - 1; i >= 0; i--) {
            if (stack.length > 0) {
                let tile = stack.shift();
                let currentRealY = this.grid.findIndex(row => row[j] === tile); 
                if(currentRealY !== -1 && currentRealY !== i) {
                    tile.y_offset -= (i - currentRealY) * (CELL_SIZE + MARGIN);
                    fallingTiles.push(tile);
                }
                this.grid[i][j] = tile;
            } else {
                if (spawnEnabled) {
                    let nt = this.randomTile();
                    nt.y_offset = -(i + 1) * (CELL_SIZE + MARGIN);
                    this.grid[i][j] = nt;
                    fallingTiles.push(nt);
                } else {
                    this.grid[i][j] = null;
                }
            }
        }

        if (fallingTiles.length > 0) {
            const dropSteps = 24;
            fallingTiles.forEach(t => t.startY = t.y_offset);
            for (let s = 1; s <= dropSteps; s++) {
                let progress = easeOutBounce(s / dropSteps);
                fallingTiles.forEach(t => t.y_offset = t.startY * (1 - progress));
                await sleep(16);
            }
            fallingTiles.forEach(t => t.y_offset = 0);
        }

        let newMatches = this.findMatches();
        if (newMatches.length > 0) {
            await sleep(100);
            await this.applyMatches(newMatches);
        }
    }
}

// 系統初始化
initLayout();
let board = new Board();

// 監聽視窗大小變化以重新排版
window.addEventListener('resize', () => {
    initLayout();
});

// ===========================
// 畫布與全域繪圖
// ===========================
function drawRect(x, y, w, h, color, outline=false, radius=5) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, radius);
    ctx.fill();
    
    if (outline) {
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 3;
        ctx.stroke();
    }
}

function drawText(text, x, y, size=18, color="#000", align="left") {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px 'Noto Sans TC', sans-serif`;
    ctx.textAlign = align;
    ctx.textBaseline = "middle";
    ctx.fillText(text, x, y);
}

function renderLoop() {
    ctx.fillStyle = "#2B2622";
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    
    board.draw(ctx);

    for (let st of swapAnimationTiles) {
        const x = BOARD_OFFSET_X + st.j * (CELL_SIZE + MARGIN);
        const y = BOARD_OFFSET_Y + st.i * (CELL_SIZE + MARGIN);
        st.tile.draw(ctx, x, y);
    }

    for (let rt of removedTilesForAnimation) {
        const x = BOARD_OFFSET_X + rt.j * (CELL_SIZE + MARGIN);
        const y = BOARD_OFFSET_Y + rt.i * (CELL_SIZE + MARGIN);
        rt.tile.draw(ctx, x, y);
    }

    // UI 背景
    ctx.fillStyle = "#DCDCDC";
    if (isMobileLayout) {
        ctx.fillRect(0, UI_Y - 10, SCREEN_WIDTH, SCREEN_HEIGHT - UI_Y + 10);
    } else {
        ctx.fillRect(UI_X, 0, UI_WIDTH, SCREEN_HEIGHT);
    }

    // 自訂按鈕
    drawRect(customBtn.x, customBtn.y, customBtn.w, customBtn.h, customMode ? "#A0C8A0" : "#C8C8C8");
    drawText(`自訂模式: ${customMode ? "ON" : "OFF"}`, customBtn.x + customBtn.w/2, customBtn.y + customBtn.h/2, 16, "#000", "center");

    // 新增：步數重置按鈕
    drawRect(resetMovesBtn.x, resetMovesBtn.y, resetMovesBtn.w, resetMovesBtn.h, "#FFE4B5"); // 使用米黃色作區分
    drawText(`步數: ${movesCount} (重置)`, resetMovesBtn.x + resetMovesBtn.w/2, resetMovesBtn.y + resetMovesBtn.h/2, 15, "#000", "center");

    // 標題說明
    drawText("點擊按鈕切換自訂版面", titlePos.x, titlePos.y, 18, "#333", "center");

    // 顏色選擇
    drawText("選擇顏色:", colorTextPos.x, colorTextPos.y);
    COLOR_NAMES.forEach((color, idx) => {
        let x = colorArea.x + idx * colorArea.spacing;
        let y = colorArea.y;
        
        // 畫底框
        drawRect(x, y, colorArea.size, colorArea.size, COLOR_MAP[color], selectedColor === color, colorArea.size/2);

        // 畫上 1 級的圖片當作預覽圖
        const prefix = IMAGE_PREFIX[color];
        const img = tileImages[`${prefix}_1`];
        if (img && img.complete && img.naturalWidth > 0) {
            const imgSize = colorArea.size * 0.8;
            ctx.drawImage(img, x + (colorArea.size - imgSize)/2, y + (colorArea.size - imgSize)/2, imgSize, imgSize);
        }
    });

    // 等級選擇
    drawText("選擇等級:", levelTextPos.x, levelTextPos.y);
    for (let lvl = 1; lvl <= MAX_LEVEL; lvl++) {
        let x = levelArea.x + (lvl - 1) * levelArea.spacing;
        let y = levelArea.y;
        drawRect(x, y, levelArea.size, levelArea.size, "#C8C8C8", selectedLevel === lvl);
        drawText(lvl.toString(), x + levelArea.size/2, y + levelArea.size/2, Math.floor(levelArea.size*0.5), "#000", "center");
    }

    // 天降開關
    drawRect(spawnBtn.x, spawnBtn.y, spawnBtn.w, spawnBtn.h, spawnEnabled ? "#A0C8A0" : "#C8A0A0");
    drawText(`天降: ${spawnEnabled ? "ON" : "OFF"}`, spawnBtn.x + spawnBtn.w/2, spawnBtn.y + spawnBtn.h/2, 16, "#000", "center");

    // 儲存與還原按鈕
    drawRect(saveBtn.x, saveBtn.y, saveBtn.w, saveBtn.h, "#90B0D0");
    drawText("儲存版面", saveBtn.x + saveBtn.w/2, saveBtn.y + saveBtn.h/2, 16, "#000", "center");
    
    drawRect(loadBtn.x, loadBtn.y, loadBtn.w, loadBtn.h, savedBoardState ? "#90B0D0" : "#A0A0A0");
    drawText("還原版面", loadBtn.x + loadBtn.w/2, loadBtn.y + loadBtn.h/2, 16, savedBoardState ? "#000" : "#666", "center");

    requestAnimationFrame(renderLoop);
}

requestAnimationFrame(renderLoop);

// ===========================
// 互動處理
// ===========================
function getCellFromMouse(mx, my) {
    for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
            let x = BOARD_OFFSET_X + j * (CELL_SIZE + MARGIN);
            let y = BOARD_OFFSET_Y + i * (CELL_SIZE + MARGIN);
            if (mx >= x && mx < x + CELL_SIZE && my >= y && my < y + CELL_SIZE) return { i, j };
        }
    }
    return null;
}

function saveBoard() {
    savedBoardState = board.grid.map(row => 
        row.map(tile => tile ? tile.clone() : null)
    );
}

function loadBoard() {
    if (!savedBoardState) return;
    board.grid = savedBoardState.map(row => 
        row.map(tile => tile ? tile.clone() : null)
    );
}

let dragStart = null;
let dragStartPixel = null;

canvas.addEventListener('mousedown', (e) => {
    if (isAnimating) return;

    // 將真實點擊座標對應到縮放後的 Canvas 座標
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    if (mx >= customBtn.x && mx <= customBtn.x + customBtn.w && my >= customBtn.y && my <= customBtn.y + customBtn.h) {
        customMode = !customMode; return;
    }
    // 新增：點擊重置步數
    if (mx >= resetMovesBtn.x && mx <= resetMovesBtn.x + resetMovesBtn.w && my >= resetMovesBtn.y && my <= resetMovesBtn.y + resetMovesBtn.h) {
        movesCount = 0; return;
    }
    if (mx >= spawnBtn.x && mx <= spawnBtn.x + spawnBtn.w && my >= spawnBtn.y && my <= spawnBtn.y + spawnBtn.h) {
        spawnEnabled = !spawnEnabled; return;
    }
    if (mx >= saveBtn.x && mx <= saveBtn.x + saveBtn.w && my >= saveBtn.y && my <= saveBtn.y + saveBtn.h) {
        saveBoard(); return;
    }
    if (savedBoardState && mx >= loadBtn.x && mx <= loadBtn.x + loadBtn.w && my >= loadBtn.y && my <= loadBtn.y + loadBtn.h) {
        loadBoard(); return;
    }

    if (my >= colorArea.y && my <= colorArea.y + colorArea.h && mx >= colorArea.x && mx <= colorArea.x + colorArea.w) {
        let idx = Math.floor((mx - colorArea.x) / colorArea.spacing);
        if (idx >= 0 && idx < COLOR_NAMES.length) selectedColor = COLOR_NAMES[idx];
        return;
    }
    if (my >= levelArea.y && my <= levelArea.y + levelArea.h && mx >= levelArea.x && mx <= levelArea.x + levelArea.w) {
        let idx = Math.floor((mx - levelArea.x) / levelArea.spacing);
        if (idx >= 0 && idx < MAX_LEVEL) selectedLevel = idx + 1;
        return;
    }

    let pos = getCellFromMouse(mx, my);
    if (pos) {
        dragStart = pos;
        board.selected = pos;
        dragStartPixel = { x: mx, y: my };
        
        if (customMode) {
            board.grid[pos.i][pos.j] = new Tile(selectedColor, selectedLevel);
        }
    }
});

// ===========================
// 優化：將滑鼠與觸控的放開事件綁定至 window，確保拉出邊界也能正確判定
// ===========================

window.addEventListener('mouseup', async (e) => {
    if (isAnimating || !dragStart) {
        dragStart = null;
        if(board) board.selected = null;
        return;
    }

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    
    isAnimating = true; 
    let { i: si, j: sj } = dragStart;

    if (!customMode) {
        // 計算位移向量與距離
        const dx = mx - dragStartPixel.x;
        const dy = my - dragStartPixel.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const swipeThreshold = CELL_SIZE * 0.4; // 滑動門檻：位移超過格子的 40%

        if (dist > swipeThreshold) {
            movesCount++;
            
            let ti = si;
            let tj = sj;

            // 根據 dx, dy 的比例判斷滑動的主方向
            if (Math.abs(dx) > Math.abs(dy)) {
                tj = sj + (dx > 0 ? 1 : -1); // 左右滑動
            } else {
                ti = si + (dy > 0 ? 1 : -1); // 上下滑動
            }

            // 檢查目標位置是否在棋盤內
            if (ti >= 0 && ti < GRID_SIZE && tj >= 0 && tj < GRID_SIZE) {
                // 在棋盤內：執行相鄰交換
                const targetCell = { i: ti, j: tj };
                await board.animatedSwap(dragStart, targetCell); 
                
                while (true) {
                    let matches = board.findMatches();
                    if (matches.length > 0) {
                        await board.applyMatches(matches);
                    } else {
                        break;
                    }
                }
            } else {
                // 在棋盤外：執行原本的邊界移除邏輯
                if (sj === 0 && (mx < LEFT_THRESHOLD || dx < -DRAG_REMOVE_DISTANCE)) {
                    await board.removeAndCollapse(si, sj);
                } else if (sj === GRID_SIZE - 1 && (mx > RIGHT_THRESHOLD || dx > DRAG_REMOVE_DISTANCE)) {
                    await board.removeAndCollapse(si, sj);
                } else if (si === GRID_SIZE - 1 && (my > DOWN_THRESHOLD || dy > DRAG_REMOVE_DISTANCE)) {
                    await board.removeAndCollapse(si, sj);
                }
            }
        }
    }

    board.selected = null;
    dragStart = null;
    dragStartPixel = null;
    isAnimating = false; 
});

// 手機觸控支援與滾動修正 (touchstart 保持綁定在 canvas)
canvas.addEventListener('touchstart', (e) => {
    if (isAnimating) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.touches[0].clientX - rect.left) * scaleX;
    const my = (e.touches[0].clientY - rect.top) * scaleY;

    if (typeof UI_Y !== 'undefined' && my < UI_Y - 10) {
        e.preventDefault(); 
    }

    let touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }));
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
    if (dragStart) {
        e.preventDefault();
    }
}, {passive: false});

// touchend 改綁定在 window，防止手指滑出 Canvas 範圍
window.addEventListener('touchend', (e) => {
    if (dragStart) {
        if (e.cancelable) e.preventDefault();
        let touch = e.changedTouches[0];
        canvas.dispatchEvent(new MouseEvent('mouseup', { 
            clientX: touch.clientX, 
            clientY: touch.clientY,
            bubbles: true // 關鍵修正：允許事件向上冒泡給 window 捕捉
        }));
    }
}, {passive: false});

// 新增：處理手指滑出實體螢幕邊緣（被系統中斷）的情況
window.addEventListener('touchcancel', (e) => {
    if (dragStart) {
        let touch = e.changedTouches[0];
        canvas.dispatchEvent(new MouseEvent('mouseup', { 
            clientX: touch.clientX, 
            clientY: touch.clientY,
            bubbles: true 
        }));
    }
}, {passive: false});

// 手機觸控支援與滾動修正
canvas.addEventListener('touchstart', (e) => {
    if (isAnimating) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.touches[0].clientX - rect.left) * scaleX;
    const my = (e.touches[0].clientY - rect.top) * scaleY;

    // 只有在點擊「珠子盤面區域」時，才阻止網頁捲動 (e.preventDefault)
    // 點擊下方的顏色選擇器、按鈕、或是空白處時，交給瀏覽器處理捲動
    if (typeof UI_Y !== 'undefined' && my < UI_Y - 10) {
        e.preventDefault(); 
    }

    let touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }));
}, {passive: false});

// 確保在拖曳珠子時，畫面絕對不會跟著滾動
canvas.addEventListener('touchmove', (e) => {
    if (dragStart) {
        e.preventDefault();
    }
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    // 只有在結束轉珠拖曳時才阻擋預設行為
    if (dragStart) {
        e.preventDefault();
    }
    let touch = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: touch.clientX, clientY: touch.clientY }));
}, {passive: false});

</script>
